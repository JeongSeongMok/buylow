# buylow — clone-and-run with Docker. 사전준비 없이 바로:
#
#   docker compose up -d --build      # → http://127.0.0.1:8420
#   # 다른 포트:  BUYLOW_PORT=9000 docker compose up -d --build
#
# 모든 마운트는 '디렉토리'다(개별 파일이 아님) — 없으면 Docker가 알아서 디렉토리로 만들어 주므로
# cp/touch 같은 사전준비가 필요 없고 OS(Windows 포함)도 가리지 않는다. 설정·DB·토큰은
# /app/state 한 곳에 모아 두었다(Dockerfile의 BUYLOW_CONFIG_LOCAL/DB_PATH/KIS_TOKEN_CACHE).
#
# 컨테이너 안에서는 0.0.0.0(BUYLOW_DASHBOARD_HOST, Dockerfile)에 바인딩하지만, 포트는 호스트의
# 127.0.0.1에만 매핑하므로 네트워크 노출 없이 로컬 전용이 유지된다(매매 제어를 쥐므로).
services:
  buylow:
    build: .
    image: buylow:local
    # 포트: 호스트 127.0.0.1:<BUYLOW_PORT>(기본 8420) → 컨테이너 8420.
    ports:
      - "127.0.0.1:${BUYLOW_PORT:-8420}:8420"
    volumes:
      # 영속 상태(컨테이너 재생성에도 살아남아야 하는 것) — 모두 디렉토리 마운트:
      - ./data:/app/data    # ETL 적재 데이터(시세·분봉·수급·펀더멘털) — 대용량
      - ./runs:/app/runs    # 백테스트 결과 blob
      - ./state:/app/state  # 설정(config.local.yaml)·실행이력(buylow.db)·KIS 토큰 캐시
    restart: unless-stopped
