{% extends "base.html" %}
{% block content %}
<p><a href="/settings">← 설정</a></p>
<section class="card">
  <h2>적재된 데이터</h2>
  <p class="meta">data: <code>{{ data_dir }}</code> · 적재는 <a href="/settings">설정 → 과거 데이터 적재</a>에서</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <table class="runs">
    <thead><tr><th>종목</th><th>가격(일봉)</th><th>수급</th><th></th></tr></thead>
    <tbody>
      {% for t in tickers %}
      <tr>
        <td>{{ t.ticker }}</td>
        <td>{{ t.price }}일</td>
        <td>{{ t.flow }}행</td>
        <td><a href="/data/{{ t.ticker }}">보기</a></td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="empty">적재된 데이터가 없습니다. 설정에서 적재하세요.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
