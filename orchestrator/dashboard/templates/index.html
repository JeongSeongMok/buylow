{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>백테스트 실행</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  {% if not has_strategy %}
  <p class="meta">아직 저장된 전략이 없습니다. 먼저 <a href="/strategy">① 전략 설정</a>에서 전략을 만들어 저장하세요.</p>
  {% else %}
  <p class="meta">저장된 전략(<a href="/strategy">① 전략 설정</a>)을 아래 조건으로 실행합니다.</p>
  <form method="post" action="/backtest">
    <label>시작일 <input type="text" name="start" value="2023-01-02"></label>
    <label>종료일 <input type="text" name="end" value="2023-12-28"></label>
    <label>초기자본(KRW) <input type="text" name="cash" value="10000000"></label>
    <hr>
    <label>유니버스 (종목코드, 쉼표) <input type="text" name="universe" value="005930"></label>
    <label><input type="checkbox" name="universe_all" value="1"> 적재된 전체 종목 스캔(위 입력 무시)</label>
    <button type="submit">백테스트 실행</button>
  </form>
  {% endif %}
</section>

<section class="card">
  <h2>실행 이력</h2>
  {% include "partials/runs_table.html" %}
</section>
{% endblock %}
