<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BuyLow</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
  <!-- DOM diff 기반 교체(morph): 폴링 갱신 시 스크롤·텍스트선택·포커스를 보존(전체 교체 방지) -->
  <script src="/static/idiomorph-ext.min.js"></script>
</head>
<body>
  <header>
    <h1><a href="/">BuyLow</a></h1>
    {# 현재 경로로 활성 탭 판별 — 서브경로(/data/005930 등)도 prefix로 강조 #}
    {% set p = request.url.path if request else '' %}
    <nav class="chapters">
      <a href="/strategy" class="{{ 'active' if p.startswith('/strategy') }}">전략 설정</a>
      <a href="/backtest" class="{{ 'active' if p.startswith('/backtest') }}">백테스트</a>
      <a href="/data" class="{{ 'active' if p.startswith('/data') }}">데이터</a>
      <a href="/groups" class="{{ 'active' if p.startswith('/groups') }}">그룹</a>
      <a href="/settings" class="{{ 'active' if p.startswith('/settings') }}">설정</a>
      <a href="/jobs" class="{{ 'active' if p.startswith('/jobs') }}">작업중</a>
      <a href="/trade" class="live-tab {{ 'active' if p.startswith('/trade') }}">● 매매</a>
    </nav>
  </header>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
